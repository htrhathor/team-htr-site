<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>HTR Team Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        button {
            background: #9146FF;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
        }

        a {
            color: #9146FF;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>TEAM HTR</h1>
        <p>Portail officiel de la team</p>

        <!-- Bouton connexion Twitch -->
        <button onclick="login()">Connexion Twitch</button>

        <br><br>

        <!-- Liens internes -->
        <a href="/team">Voir la Team HTR</a> | 
        <a href="/dashboard">Dashboard Modération</a> | 
        <a href="/admin">Panel Admin</a>

    </div>

    <script>
        function login() {
            // Redirige vers la route /login de ton API Flask
            window.location.href = "/login";
        }
    </script>

</body>

</html>
